<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporting System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7fa; color: #333; }
    header { background: #0070f3; color: white; padding: 20px; text-align: center; }
    nav { display: flex; background: #005bb5; }
    nav a { flex: 1; color: white; text-align: center; padding: 14px; text-decoration: none; font-weight: bold; }
    nav a.active { background: #0070f3; }
    nav a:hover { background: #0060d0; }
    .container { max-width: 720px; margin: 30px auto; padding: 0 20px; }
    form { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    label { display: block; margin: 18px 0 6px; font-weight: 600; }
    input, textarea { width: 100%; padding: 11px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    textarea { min-height: 100px; }
    button { background: #10b981; color: white; border: none; padding: 14px 28px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 20px; }
    button:hover { background: #059669; }
    #status { margin-top: 16px; font-weight: bold; text-align: center; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .report-item { background: white; padding: 20px; margin: 20px 0; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); line-height: 1.6; }
  </style>
</head>
<body>

  <header><h1>Reporting System</h1></header>

  <nav>
    <a href="#submit" class="active" onclick="showTab('submit')">Submit Report</a>
    <a href="#view" onclick="showTab('view')">View All Reports</a>
  </nav>

  <div class="container">

    <div id="submit" class="tab-content active">
      <form id="reportForm">
        <label>Reported User Name</label>
        <input id="reported_user" placeholder="Username or ID" required>

        <label>Reason for Report</label>
        <textarea id="reason" placeholder="Describe the incident..." required></textarea>

        <label>Proposed Punishment</label>
        <input id="punishment" placeholder="e.g. Warning / Ban">

        <label>Moderator Who Took Action</label>
        <input id="moderator" placeholder="Your username" required>

        <label>Additional Link</label>
        <input id="link" placeholder="https://" type="url">

        <label>Image Proof (optional)</label>
        <input type="file" id="image" accept="image/*">

        <label>Video Proof (optional)</label>
        <input type="file" id="video" accept="video/*">

        <button type="submit">Submit Report</button>
      </form>
      <div id="status"></div>
    </div>

    <div id="view" class="tab-content">
      <div id="reports-list">Loading reports...</div>
    </div>

  </div>

  <script>
    const supabaseUrl = 'https://ugijazxbscpiwavmkjbr.supabase.co';
    const supabaseKey = 'sb_publishable_tUlhOkObHpTpwlh-9R7x0Q_1kd_q6qe';
    const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
      document.querySelector(`nav a[href="#${tabId}"]`).classList.add('active');
      if (tabId === 'view') loadReports();
    }

    async function loadReports() {
      const list = document.getElementById('reports-list');
      list.innerHTML = 'Loading reports...';

      const { data, error } = await supabase.from('reports').select('*').order('created_at', { ascending: false });

      if (error) return list.innerHTML = 'Error: ' + error.message;
      if (data.length === 0) return list.innerHTML = '<p>No reports yet.</p>';

      list.innerHTML = '';
      data.forEach(r => {
        const div = document.createElement('div');
        div.className = 'report-item';
        div.innerHTML = `
          <strong>Reported:</strong> ${r.reported_user || '—'}<br>
          <strong>Reason:</strong> ${r.reason || '—'}<br>
          <strong>Punishment:</strong> ${r.punishment || 'None'}<br>
          <strong>Moderator:</strong> ${r.moderator || '—'}<br>
          <strong>Submitted:</strong> ${new Date(r.created_at).toLocaleString()}<br>
        `;
        if (r.link) div.innerHTML += `<strong>Link:</strong> <a href="${r.link}" target="_blank">${r.link}</a><br>`;
        if (r.image_url) div.innerHTML += `<img src="${r.image_url}" style="max-width:100%; margin-top:12px;" alt="Image"><br>`;
        if (r.video_url) div.innerHTML += `<video src="${r.video_url}" controls style="max-width:100%; margin-top:12px;"></video><br>`;
        list.appendChild(div);
      });
    }

    // Fixed: Wait for DOM to be ready before attaching listener
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('reportForm');
      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const status = document.getElementById('status');
          status.textContent = 'Submitting...';
          status.style.color = 'black';

          const reported_user = document.getElementById('reported_user').value.trim() || null;
          const reason = document.getElementById('reason').value.trim();
          const punishment = document.getElementById('punishment').value.trim() || null;
          const moderator = document.getElementById('moderator').value.trim() || null;
          const link = document.getElementById('link').value.trim() || null;

          let image_url = '', video_url = '';
          const imageFile = document.getElementById('image').files[0];
          const videoFile = document.getElementById('video').files[0];

          try {
            if (imageFile) {
              const path = `images/${Date.now()}_${imageFile.name}`;
              await supabase.storage.from('report-media').upload(path, imageFile);
              image_url = `${supabaseUrl}/storage/v1/object/public/report-media/${path}`;
            }
            if (videoFile) {
              const path = `videos/${Date.now()}_${videoFile.name}`;
              await supabase.storage.from('report-media').upload(path, videoFile);
              video_url = `${supabaseUrl}/storage/v1/object/public/report-media/${path}`;
            }

            const { error } = await supabase.from('reports').insert({
              reported_user, reason, punishment, moderator, link, image_url, video_url
            });

            if (error) throw error;

            status.style.color = 'green';
            status.textContent = 'Report submitted successfully!';
            form.reset();
          } catch (err) {
            status.style.color = 'red';
            status.textContent = 'Error: ' + (err.message || 'Unknown error');
          }
        });
      }
    });
  </script>
</body>
</html>
