<script>
  const PASSWORD = "Eastern123";

  function checkPassword() {
    const input = document.getElementById('password-input').value;
    const error = document.getElementById('password-error');
    if (input === PASSWORD) {
      document.getElementById('password-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
    } else {
      error.textContent = 'Incorrect password. Try again.';
      error.style.color = 'red';
    }
  }

  // Allow Enter key to submit password
  document.getElementById('password-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      checkPassword();
    }
  });

  // Supabase – ONLY ONE instance
  const supabaseUrl = 'https://ugijazxbscpiwavmkjbr.supabase.co';
  const supabaseKey = 'sb_publishable_tUlhOkObHpTpwlh-9R7x0Q_1kd_q6qe';
  const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

  function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    document.querySelector(`nav a[href="#${tabId}"]`).classList.add('active');
    if (tabId === 'view') loadReports();
  }

  async function loadReports() {
    const list = document.getElementById('reports-list');
    list.innerHTML = 'Loading...';

    const { data, error } = await supabase
      .from('reports')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      list.innerHTML = 'Error loading reports: ' + error.message;
      return;
    }

    if (data.length === 0) {
      list.innerHTML = '<p style="text-align:center; color:#666;">No reports submitted yet.</p>';
      return;
    }

    list.innerHTML = '';
    data.forEach(r => {
      const div = document.createElement('div');
      div.style = 'background:white; padding:20px; margin:15px 0; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);';
      div.innerHTML = `
        <strong>Reported:</strong> ${r.reported_user || 'Unknown'}<br>
        <strong>Reason:</strong> ${r.reason || 'N/A'}<br>
        <strong>Punishment:</strong> ${r.punishment || 'None'}<br>
        <strong>Moderator:</strong> ${r.moderator || 'Not specified'}<br>
        <strong>Submitted:</strong> ${new Date(r.created_at).toLocaleString()}<br>
      `;
      if (r.link) div.innerHTML += `<strong>Proof link:</strong> <a href="${r.link}" target="_blank">${r.link}</a><br>`;
      if (r.image_url) div.innerHTML += `<img src="${r.image_url}" style="max-width:100%; margin:10px 0; border-radius:6px;" alt="Proof image"><br>`;
      if (r.video_url) div.innerHTML += `<video src="${r.video_url}" controls style="max-width:100%; margin:10px 0; border-radius:6px;"></video><br>`;
      list.appendChild(div);
    });
  }

  document.getElementById('reportForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const status = document.getElementById('status');
    status.textContent = 'Submitting...';

    const reported_user = document.getElementById('reported_user').value.trim() || null;
    const reason = document.getElementById('reason').value.trim();
    const punishment = document.getElementById('punishment').value.trim() || null;
    const moderator = document.getElementById('moderator').value.trim() || null;
    const link = document.getElementById('link').value.trim() || null;

    let image_url = '', video_url = '';
    const imageFile = document.getElementById('image').files[0];
    const videoFile = document.getElementById('video').files[0];

    try {
      if (imageFile) {
        const path = `images/${Date.now()}_${imageFile.name}`;
        await supabase.storage.from('report-media').upload(path, imageFile);
        image_url = `${supabaseUrl}/storage/v1/object/public/report-media/${path}`;
      }
      if (videoFile) {
        const path = `videos/${Date.now()}_${videoFile.name}`;
        await supabase.storage.from('report-media').upload(path, videoFile);
        video_url = `${supabaseUrl}/storage/v1/object/public/report-media/${path}`;
      }

      const { error } = await supabase.from('reports').insert({
        reported_user, reason, punishment, moderator, link, image_url, video_url
      });

      if (error) throw error;

      status.style.color = 'green';
      status.textContent = 'Report submitted successfully!';
      document.getElementById('reportForm').reset();
    } catch (err) {
      status.style.color = 'red';
      status.textContent = 'Error: ' + err.message;
    }
  });
</script>
